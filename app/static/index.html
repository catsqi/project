<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interviewer | Immersive Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --bg: #030712;
            --panel: rgba(17, 24, 39, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #10b981;
            /* 字号整体提大 */
            --font-base: 1.1rem;
            --font-lg: 1.25rem;
            --font-xl: 1.5rem;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(16, 185, 129, 0.1) 0px, transparent 40%);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-size: var(--font-base);
        }

        /* 沉浸式顶部 */
        header {
            padding: 1.5rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            z-index: 50;
        }

        .branded {
            font-family: 'Outfit', sans-serif;
            font-size: var(--font-xl);
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(to right, #818cf8, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 仪表盘浮窗 */
        #dash {
            position: fixed;
            top: 2rem;
            right: 2rem;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.2rem;
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            z-index: 100;
            min-width: 200px;
        }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.9rem; }
        .stat-val { font-weight: 700; color: var(--accent); }

        /* 聊天主区域 */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            width: 90%;
            margin: 0 auto 100px; /* 为底部输入留白 */
            position: relative;
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 0;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            scrollbar-width: none;
        }
        #chat-window::-webkit-scrollbar { display: none; }

        .bubble {
            max-width: 85%;
            padding: 1.5rem 2rem;
            border-radius: 2rem;
            line-height: 1.7;
            font-size: var(--font-lg);
            position: relative;
            animation: emerge 0.4s cubic-bezier(0, 1, 0, 1);
        }

        @keyframes emerge { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .user-bubble {
            align-self: flex-end;
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            color: white;
            border-bottom-right-radius: 0.2rem;
            box-shadow: 0 10px 30px var(--primary-glow);
        }

        .ai-bubble {
            align-self: flex-start;
            background: var(--panel);
            border: 1px solid var(--border);
            border-bottom-left-radius: 0.2rem;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        /* 语音波形动态效果 (待接入) */
        .wave-container {
            display: flex;
            align-items: center;
            gap: 4px;
            height: 20px;
            margin-top: 1rem;
            opacity: 0.7;
        }
        .wave-bar {
            width: 3px;
            background: var(--primary);
            border-radius: 2px;
            height: 100%;
            animation: pulse-wave 1s infinite alternate;
        }
        .wave-bar:nth-child(2) { animation-delay: 0.2s; }
        .wave-bar:nth-child(3) { animation-delay: 0.4s; }
        .wave-bar:nth-child(4) { animation-delay: 0.1s; }
        @keyframes pulse-wave { from { height: 10%; } to { height: 100%; } }

        .timing {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            gap: 1.5rem;
            border-top: 1px solid var(--border);
            padding-top: 0.6rem;
        }
        .timing b { color: var(--accent); }

        /* 底部输入舱 */
        footer {
            position: fixed;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 750px;
            padding: 0 2rem;
            z-index: 60;
        }

        .input-pod {
            background: rgba(31, 41, 55, 0.6);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 3rem;
            display: flex;
            align-items: center;
            padding: 0.6rem 1rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: all 0.3s;
        }

        .input-pod:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 30px var(--primary-glow);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 0.8rem 1.5rem;
            outline: none;
            font-size: var(--font-lg);
            font-family: inherit;
        }

        .action-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .action-btn:hover { transform: scale(1.1) rotate(-10deg); filter: brightness(1.2); }
        .action-btn:disabled { background: #334155; transform: none; }

        .mic-btn {
            background: transparent;
            border: 1px solid var(--border);
            margin-right: 0.5rem;
            color: var(--text-muted);
        }
        .mic-btn:hover { color: var(--accent); border-color: var(--accent); }

    </style>
</head>
<body>
    <header>
        <div class="branded">AI INTERVIEWER</div>
        <div style="display: flex; gap: 1rem;">
            <div id="connection-led" style="width: 12px; height: 12px; background: #6b7280; border-radius: 50%; margin-top: 5px;"></div>
            <div id="status-txt" style="font-size: 0.9rem; color: var(--text-muted);">CONNECTING...</div>
        </div>
    </header>

    <div id="dash">
        <div class="stat-row">
            <span>Latency (TTFT)</span>
            <span class="stat-val" id="dash-ttft">-- ms</span>
        </div>
        <div class="stat-row">
            <span>Flow (TPS)</span>
            <span class="stat-val" id="dash-tps">-- t/s</span>
        </div>
    </div>

    <main>
        <div id="chat-window">
            <div class="bubble ai-bubble">
                面试官已上线。
                今天我们以一种更沉浸的方式开始讨论。
                我已准备好接收你的指令或点击下方的麦克风。
            </div>
        </div>
    </main>

    <footer>
        <div class="input-pod">
            <button class="action-btn mic-btn" title="未来语音接入入口">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
            </button>
            <input type="text" id="user-input" placeholder="输入对话内容，或准备语音对练..." autocomplete="off">
            <button class="action-btn" id="send-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </footer>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const dashTTFT = document.getElementById('dash-ttft');
        const dashTPS = document.getElementById('dash-tps');
        const led = document.getElementById('connection-led');
        const statusTxt = document.getElementById('status-txt');

        let chatHistory = [];

        // 健康检查 & 建立状态
        async function checkStatus() {
            try {
                const res = await fetch('/health');
                const data = await res.json();
                led.style.background = "#10b981";
                led.style.boxShadow = "0 0 10px #10b981";
                statusTxt.textContent = "READY - " + data.app.split(' ')[0];
            } catch (e) {
                statusTxt.textContent = "OFFLINE";
                led.style.background = "#ef4444";
            }
        }
        checkStatus();

        async function postMessage() {
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            input.disabled = true;
            sendBtn.disabled = true;

            appendBubble('user-bubble', text);

            const startTime = performance.now();
            let ttftTime = null;
            let tokenCount = 0;

            const aiBubble = appendBubble('ai-bubble', '...');
            const statsArea = document.createElement('div');
            statsArea.className = 'timing';
            aiBubble.appendChild(statsArea);

            try {
                const response = await fetch('/api/v1/interview/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, history: chatHistory })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullContent = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    
                    if (ttftTime === null && chunk.trim()) {
                        ttftTime = performance.now();
                        const ttft = (ttftTime - startTime).toFixed(0);
                        dashTTFT.textContent = `${ttft} ms`;
                        statsArea.innerHTML = `TTFT: <b>${ttft}ms</b> | <span id="realtime-total">Waiting...</span>`;
                    }

                    if (fullContent === "...") {
                        // 移除占位符
                        aiBubble.childNodes[0].textContent = "";
                        fullContent = "";
                    }
                    
                    fullContent += chunk;
                    tokenCount++;
                    aiBubble.childNodes[0].textContent = fullContent;
                    chatWindow.scrollTop = chatWindow.scrollHeight;

                    // 计算实时 TPS
                    if (ttftTime) {
                        const elapsed = (performance.now() - ttftTime) / 1000;
                        if (elapsed > 0.1) {
                            dashTPS.textContent = (tokenCount / elapsed).toFixed(1) + " t/s";
                        }
                    }
                }

                const totalTime = (performance.now() - startTime).toFixed(0);
                statsArea.innerHTML = `TTFT: <b>${(ttftTime-startTime).toFixed(0)}ms</b> | Total: <b>${totalTime}ms</b>`;

                chatHistory.push({ role: "user", content: text }, { role: "assistant", content: fullContent });

            } catch (e) {
                aiBubble.childNodes[0].textContent = "Error: " + e.message;
            } finally {
                input.disabled = false;
                btn.disabled = false;
                input.focus();
            }
        }

        function appendBubble(cls, text) {
            const div = document.createElement('div');
            div.className = `bubble ${cls}`;
            div.innerHTML = `<div>${text}</div>`;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return div;
        }

        sendBtn.onclick = postMessage;
        input.onkeydown = e => { if (e.key === 'Enter') postMessage(); };
    </script>
</body>
</html>
