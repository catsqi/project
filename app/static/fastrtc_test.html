<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 面试官 - 沉浸式模拟面试</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --bg-surface: rgba(15, 23, 42, 0.7);
            --primary: #38bdf8;
            --primary-glow: rgba(56, 189, 248, 0.4);
            --accent: #22c55e;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(255, 255, 255, 0.03);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Background Visuals */
        .ambient-glow {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            background: 
                radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.1), transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(34, 197, 94, 0.05), transparent 40%);
        }

        /* Main Layout */
        .app-container {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 20px;
            padding: 24px;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        /* Left Section: Interviewer & Visualizer */
        .interview-view {
            position: relative;
            background: var(--bg-surface);
            border-radius: 32px;
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.5);
        }

        #interviewer-avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            z-index: 1;
            opacity: 0.8;
            transition: opacity 0.5s ease;
        }

        .visualizer-overlay {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        canvas#audio-visualizer {
            width: 600px;
            height: 120px;
            filter: drop-shadow(0 0 10px var(--primary-glow));
        }

        .asr-live-overlay {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 99px;
            border: 1px solid var(--primary-glow);
            font-size: 1.1rem;
            color: var(--primary);
            font-weight: 500;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            max-width: 80%;
            text-align: center;
        }

        .asr-live-overlay.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Right Section: Transcript Panel */
        .transcript-panel {
            background: var(--bg-surface);
            border-radius: 32px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 24px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            letter-spacing: -0.02em;
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 99px;
            font-size: 0.8rem;
            color: var(--text-muted);
            border: 1px solid var(--glass-border);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #64748b;
        }

        .status-dot.active {
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
        }

        .chat-feed {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scrollbar-width: thin;
            scrollbar-color: var(--glass-border) transparent;
        }

        .bubble {
            max-width: 90%;
            padding: 16px 20px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.6;
            animation: fadeInSlide 0.4s ease-out forwards;
        }

        @keyframes fadeInSlide {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bubble.ai {
            align-self: flex-start;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
            color: var(--text-main);
        }

        .bubble.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #0ea5e9, #38bdf8);
            color: #0c4a6e;
            font-weight: 600;
            border-bottom-right-radius: 4px;
        }

        /* Control Bar */
        .controls {
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 16px;
            z-index: 100;
        }

        .btn {
            border: none;
            padding: 14px 28px;
            border-radius: 99px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0ea5e9, #38bdf8);
            color: #0c4a6e;
            box-shadow: 0 8px 20px -6px var(--primary-glow);
        }

        .btn-primary:active { transform: scale(0.96); }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
        }

        .btn-outline:hover {
            color: var(--text-main);
            border-color: var(--primary);
            background: var(--glass-bg);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-danger:hover {
            background: #ef4444;
            color: white;
        }

        /* Stats Panel */
        .stats-overlay {
            position: absolute;
            top: 24px;
            left: 24px;
            display: flex;
            gap: 12px;
            z-index: 10;
        }

        .stat-item {
            padding: 6px 12px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            border-radius: 8px;
            font-size: 0.75rem;
            color: var(--text-muted);
            border: 1px solid var(--glass-border);
        }

        .stat-item b { color: var(--primary); font-weight: 600; }

        @media (max-width: 1024px) {
            .app-container { grid-template-columns: 1fr; }
            .transcript-panel { height: 400px; }
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>
    <audio id="remote-audio" autoplay playsinline></audio>

    <div class="app-container">
        <!-- Main Interviewer Area -->
        <main class="interview-view">
            <div class="stats-overlay">
                <div class="stat-item">ASR: <b id="stat-asr">idle</b></div>
                <div class="stat-item">LLM: <b id="stat-ttft">-- ms</b></div>
                <div class="stat-item">RTC: <b id="stat-rtc">idle</b></div>
            </div>

            <img id="interviewer-avatar" src="/static/avatar.png" alt="AI Interviewer">
            
            <div class="visualizer-overlay">
                <div id="asr-live" class="asr-live-overlay">正在听您说话...</div>
                <canvas id="audio-visualizer"></canvas>
            </div>
        </main>

        <!-- Sidebar Transcript -->
        <aside class="transcript-panel">
            <div class="panel-header">
                <h2>面试记录</h2>
                <div class="status-pill">
                    <span class="status-dot" id="status-dot"></span>
                    <span id="status-text">就绪</span>
                </div>
            </div>
            <div class="chat-feed" id="chat-window">
                <div class="bubble ai">
                    你好！我是你的 AI 面试官。准备好开始今天的模拟面试了吗？点击下方的按钮即可进入面试间。
                </div>
            </div>
        </aside>
    </div>

    <!-- Floating Navigation / Controls -->
    <div class="controls">
        <button class="btn btn-primary" id="start-btn">
            进入面试间
        </button>
        <button class="btn btn-outline" id="mute-btn" disabled>
            静音麦克风
        </button>
        <button class="btn btn-danger" id="end-btn" style="display: none;">
            结束面试
        </button>
    </div>

    <script>
        const chatWindow = document.getElementById("chat-window");
        const startBtn = document.getElementById("start-btn");
        const endBtn = document.getElementById("end-btn");
        const muteBtn = document.getElementById("mute-btn");
        const statusDot = document.getElementById("status-dot");
        const statusText = document.getElementById("status-text");
        const asrLive = document.getElementById("asr-live");
        const remoteAudio = document.getElementById("remote-audio");
        
        // Stats
        const statAsr = document.getElementById("stat-asr");
        const statTtft = document.getElementById("stat-ttft");
        const statRtc = document.getElementById("stat-rtc");

        let peerConnection = null;
        let localStream = null;
        let audioContext = null;
        let analyzer = null;
        let dataArray = null;
        let isMuted = false;

        // Visualizer Setup
        const canvas = document.getElementById("audio-visualizer");
        const ctx = canvas.getContext("2d");

        function setupVisualizer(stream) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaStreamSource(stream);
            analyzer = audioContext.createAnalyser();
            analyzer.fftSize = 256;
            source.connect(analyzer);

            const bufferLength = analyzer.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);

            draw();
        }

        function draw() {
            if (!analyzer) return;
            requestAnimationFrame(draw);
            
            analyzer.getByteFrequencyData(dataArray);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const barWidth = (canvas.width / dataArray.length) * 2.5;
            let barHeight;
            let x = 0;

            for (let i = 0; i < dataArray.length; i++) {
                barHeight = (dataArray[i] / 255) * canvas.height;
                
                // Aesthetic Gradient
                const gradient = ctx.createLinearGradient(0, canvas.height, 0, 0);
                gradient.addColorStop(0, '#38bdf8');
                gradient.addColorStop(1, '#22c55e');

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(x, canvas.height - barHeight, barWidth - 4, barHeight, 4);
                ctx.fill();

                x += barWidth;
            }
        }

        function appendBubble(role, text) {
            const div = document.createElement("div");
            div.className = `bubble ${role}`;
            div.textContent = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return div;
        }

        function setStatus(text, active = false) {
            statusText.textContent = text;
            statusDot.className = `status-dot ${active ? 'active' : ''}`;
        }

        async function startInterview() {
            startBtn.disabled = true;
            setStatus("正在搜集环境信息...", false);
            console.log(">>> [WebRTC] Starting interview session...");
            
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { 
                        echoCancellation: true, 
                        noiseSuppression: true,
                        autoGainControl: true
                    } 
                });
                console.log(">>> [WebRTC] Microphone access granted");
                setupVisualizer(localStream);

                // 1. 获取 ICE 配置
                let iceConfig = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };
                try {
                    console.log(">>> [WebRTC] Fetching ICE config from /voice/webrtc/config...");
                    const cfgRes = await fetch("/voice/webrtc/config");
                    if (cfgRes.ok) {
                        iceConfig = await cfgRes.json();
                        console.log(">>> [WebRTC] Received ICE Config:", iceConfig);
                    } else {
                        console.warn(">>> [WebRTC] Config endpoint returned error, using fallback.");
                    }
                } catch (e) {
                    console.error(">>> [WebRTC] Failed to fetch config, using fallback STUN:", e);
                }

                // 2. 初始化 PeerConnection
                const pc = new RTCPeerConnection(iceConfig);
                const webrtcId = Math.random().toString(36).slice(2);
                peerConnection = pc;

                localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

                // 3. 事件监听
                pc.onicecandidate = (event) => {
                    if (event.candidate) {
                        console.log(">>> [WebRTC] New ICE candidate:", event.candidate.candidate);
                    } else {
                        console.log(">>> [WebRTC] ICE candidate gathering complete");
                    }
                };

                pc.oniceconnectionstatechange = () => {
                    console.log(">>> [WebRTC] ICE connection state:", pc.iceConnectionState);
                    if (pc.iceConnectionState === "connected") {
                        statRtc.textContent = "connected";
                        statRtc.style.color = "var(--accent)";
                    } else if (pc.iceConnectionState === "failed" || pc.iceConnectionState === "disconnected") {
                        statRtc.textContent = pc.iceConnectionState;
                        statRtc.style.color = "#ef4444";
                        setStatus(`连接${pc.iceConnectionState === 'failed' ? '失败' : '中断'}`, false);
                    }
                };

                pc.ontrack = (event) => {
                    console.log(">>> [WebRTC] Remote track received");
                    remoteAudio.srcObject = event.streams[0];
                };

                pc.onconnectionstatechange = () => {
                    console.log(">>> [WebRTC] Connection state:", pc.connectionState);
                    if (pc.connectionState === "connected") {
                        startBtn.style.display = "none";
                        endBtn.style.display = "flex";
                        muteBtn.disabled = false;
                        setStatus("正在通话", true);
                        if (!window._welcomed) {
                            appendBubble("ai", "我准备好了，请开始。");
                            window._welcomed = true;
                        }
                    }
                };

                // 4. DataChannel 设置
                pc.ondatachannel = (event) => {
                    const dc = event.channel;
                    console.log(">>> [WebRTC] DataChannel received:", dc.label);
                    let currentAiBubble = null;

                    dc.onmessage = (e) => {
                        const msg = JSON.parse(e.data);
                        console.log(">>> [DataChannel]", msg);
                        
                        if (msg.type === "asr") {
                            asrLive.textContent = msg.text;
                            asrLive.classList.add("visible");
                            statAsr.textContent = `${msg.latency}ms`;
                            
                            if (msg.is_final) {
                                appendBubble("user", msg.text);
                                setTimeout(() => asrLive.classList.remove("visible"), 2000);
                            }
                        }

                        if (msg.type === "llm_token") {
                            if (!currentAiBubble) {
                                currentAiBubble = appendBubble("ai", "");
                            }
                            currentAiBubble.textContent += msg.token;
                            chatWindow.scrollTop = chatWindow.scrollHeight;
                        }

                        if (msg.type === "status") {
                            if (msg.text.includes("思考")) {
                                setStatus("面试官正在思考...", true);
                                currentAiBubble = null;
                            } else if (msg.text === "done") {
                                setStatus("正在通话", true);
                            }
                        }
                    };
                };

                // 5. WebRTC 握手 (Offer/Answer)
                console.log(">>> [WebRTC] Creating offer...");
                pc.createDataChannel("chat");
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);

                console.log(">>> [WebRTC] Sending offer to server...");
                const response = await fetch("/voice/webrtc/offer", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ sdp: offer.sdp, type: offer.type, webrtc_id: webrtcId })
                });

                if (!response.ok) {
                    throw new Error(`Offer failed: ${response.statusText}`);
                }

                const answer = await response.json();
                console.log(">>> [WebRTC] Received answer, setting remote description...");
                await pc.setRemoteDescription(answer);

            } catch (error) {
                console.error(">>> [WebRTC] SEVERE Error:", error);
                appendBubble("ai", `连接失败: ${error.message || '未知错误'}`);
                startBtn.disabled = false;
                setStatus("连接失败", false);
            }
        }

        function endInterview() {
            if (peerConnection) peerConnection.close();
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            if (audioContext) audioContext.close();
            
            location.reload();
        }

        startBtn.addEventListener("click", startInterview);
        endBtn.addEventListener("click", endInterview);
        
        muteBtn.addEventListener("click", () => {
            isMuted = !isMuted;
            localStream.getAudioTracks()[0].enabled = !isMuted;
            muteBtn.textContent = isMuted ? "取消静音" : "静音麦克风";
        });
    </script>
</body>
</html>
